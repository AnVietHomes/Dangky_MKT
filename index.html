<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Ký Marketing - An Việt Homes</title>
  
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-blue: #004b9a;
      --text-dark: #333333;
      --text-gray: #777777;
      --input-bg: #f4f6f8;
      --border-color: #e5e8ec;
      --success-green: #27ae60;
    }
    
    /* Hình nền Full màn hình (Bạn có thể thay link ảnh tòa nhà thực tế của AVH vào đây) */
    body { 
      font-family: 'Manrope', sans-serif; 
      margin: 0; 
      padding: 20px; 
      background: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;
      background-attachment: fixed;
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh;
      box-sizing: border-box;
    }
    
    /* Box chứa nội dung trung tâm */
    .card-container {
      background-color: #ffffff;
      width: 100%;
      max-width: 760px;
      border-radius: 16px;
      padding: 40px 50px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
      position: relative;
      box-sizing: border-box;
    }

    /* Logo */
    .logo-box { text-align: center; margin-bottom: 25px; }
    .brand-logo { max-width: 180px; height: auto; }

    /* Nút Tabs dạng Switcher */
    .tabs-wrapper {
      background-color: var(--input-bg);
      border-radius: 10px;
      display: flex;
      padding: 5px;
      margin-bottom: 30px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 12px 0;
      font-weight: 700;
      font-size: 15px;
      color: var(--text-gray);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .tab.active {
      background-color: var(--primary-blue);
      color: #ffffff;
      box-shadow: 0 4px 10px rgba(0, 75, 154, 0.2);
    }

    .section-title {
      text-align: center;
      color: var(--primary-blue);
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 25px;
      text-transform: uppercase;
    }

    /* Quản lý Tab Content */
    .tab-content { display: none; animation: fadeIn 0.4s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Form Layout Grid */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .form-group { display: flex; flex-direction: column; }
    .form-group.full-width { grid-column: span 2; }
    
    .form-group label {
      font-weight: 700;
      font-size: 14px;
      color: var(--text-dark);
      margin-bottom: 8px;
    }
    
    /* Input Fields chuẩn xám nhạt không viền gắt */
    .form-control {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid transparent;
      border-radius: 8px;
      background-color: var(--input-bg);
      font-family: 'Manrope', sans-serif;
      font-size: 14px;
      color: #333;
      box-sizing: border-box;
      transition: all 0.3s;
    }
    .form-control::placeholder { color: #aaa; font-weight: 500; }
    .form-control:focus {
      background-color: #fff;
      border-color: var(--primary-blue);
      outline: none;
      box-shadow: 0 0 0 3px rgba(0, 75, 154, 0.1);
    }

    /* Tùy biến icon của thẻ Select */
    select.form-control {
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23666' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 15px center;
      background-size: 15px;
      padding-right: 40px;
    }

    /* Nút Submit */
    .btn-submit {
      background-color: var(--primary-blue);
      color: white;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      text-transform: uppercase;
      margin-top: 10px;
      transition: background-color 0.2s;
    }
    .btn-submit:hover { background-color: #003a7a; }
    .btn-submit:disabled { background-color: #a0a0a0; cursor: not-allowed; }

    /* Tra Cứu Styles (Giữ nguyên cấu trúc hoạt động, điều chỉnh CSS khớp Box) */
    .search-box { display: flex; gap: 15px; margin-bottom: 30px; }
    .search-box .form-control { flex: 1; margin-bottom: 0; }
    .search-box .btn-submit { width: auto; margin-top: 0; padding: 14px 35px; border-radius: 8px; }
    
    .search-result-container { display: none; }
    
    .stepper-wrapper { position: relative; margin-bottom: 40px; padding: 0 10px; }
    .stepper-line { position: absolute; top: 16px; left: 30px; right: 30px; height: 3px; background-color: var(--border-color); z-index: 1; }
    .stepper-line-fill { position: absolute; top: 16px; left: 30px; height: 3px; background-color: var(--success-green); z-index: 1; width: 0%; transition: width 0.5s ease; }
    
    .stepper { display: flex; justify-content: space-between; position: relative; z-index: 2; }
    .step { display: flex; flex-direction: column; align-items: center; width: 60px; }
    .step-circle { width: 34px; height: 34px; border-radius: 50%; background-color: #fff; border: 3px solid var(--border-color); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: #999; margin-bottom: 10px; transition: all 0.3s ease; }
    .step.completed .step-circle { background-color: var(--success-green); border-color: var(--success-green); color: #fff; }
    .step.active .step-circle { border-color: var(--primary-blue); background-color: var(--primary-blue); color: #fff; box-shadow: 0 0 0 4px rgba(0,75,154,0.15); }
    .step-label { font-size: 13px; font-weight: 700; color: #999; white-space: nowrap; }
    .step.completed .step-label { color: var(--text-dark); }
    .step.active .step-label { color: var(--primary-blue); }

    .result-card { background: #fff; border-left: 5px solid var(--primary-blue); padding: 25px; border-radius: 8px; border: 1px solid var(--border-color); }
    .result-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 15px; border-bottom: 1px dashed #eee; padding-bottom: 15px; }
    .result-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .result-label { color: var(--text-gray); font-weight: 600; }
    .result-value { font-weight: 800; color: var(--text-dark); }
    .val-highlight { color: var(--primary-blue); font-size: 16px; }
    .val-status { color: #f39c12; }

    @media (max-width: 768px) {
      .card-container { padding: 30px 20px; }
      .grid-2 { grid-template-columns: 1fr; gap: 15px; }
      .form-group.full-width { grid-column: 1; }
    }
  </style>
</head>
<body>

<div class="card-container">
  
  <div class="logo-box">
    <img src="logo.svg" alt="An Việt Homes" class="brand-logo" onerror="this.src='https://placehold.co/180x60/ffffff/004b9a?text=AN+VIET+HOMES'">
  </div>

  <div class="tabs-wrapper">
    <div class="tab active" onclick="switchTab('dangky', this)">ĐĂNG KÝ CHIẾN DỊCH</div>
    <div class="tab" onclick="switchTab('tracuu', this)">TRA CỨU TIẾN ĐỘ</div>
  </div>

  <div id="dangky" class="tab-content active">
    <div class="section-title">THÔNG TIN ĐỀ XUẤT</div>
    
    <form id="marketingForm">
      <div class="grid-2">
        <div class="form-group">
          <label>Tên nhóm/Team</label>
          <input type="text" id="teamName" class="form-control" required placeholder="Nhập tên nhóm...">
        </div>
        <div class="form-group">
          <label>Tên Trưởng Nhóm</label>
          <input type="text" id="memberName" class="form-control" required placeholder="Nhập họ và tên...">
        </div>
        
        <div class="form-group">
          <label>Phòng Kinh Doanh</label>
          <select id="department" class="form-control" required>
            <option value="" disabled selected>Chọn phòng ban</option>
            <option value="Phòng KD 1">Phòng KD 1</option>
            <option value="Phòng KD 2">Phòng KD 2</option>
            <option value="Phòng KD 3">Phòng KD 3</option>
          </select>
        </div>
        <div class="form-group">
          <label>Khối kinh doanh</label>
          <select id="division" class="form-control" required>
            <option value="" disabled selected>Chọn khối</option>
            <option value="Khối 1">Khối 1</option>
            <option value="Khối 2">Khối 2</option>
          </select>
        </div>

        <div class="form-group full-width">
          <label>Tên chiến dịch/ Dự án</label>
          <input type="text" id="projectName" class="form-control" required placeholder="Nhập tên chiến dịch hoặc dự án...">
        </div>

        <div class="form-group">
          <label>Ngân sách đề xuất (VNĐ)</label>
          <input type="number" id="proposedBudget" class="form-control" required placeholder="VD: 30000000">
        </div>
        <div class="form-group">
          <label>KPI Cam kết</label>
          <input type="text" id="kpi" class="form-control" required placeholder="VD: 50 Data Net">
        </div>

        <div class="form-group">
          <label>Kênh chạy</label>
          <select id="channel" class="form-control" required>
            <option value="Facebook Ads">Facebook Ads</option>
            <option value="Google Ads">Google Ads</option>
            <option value="Tiktok Ads">Tiktok Ads</option>
          </select>
        </div>
        <div class="form-group">
          <label>Phương án chạy</label>
          <select id="runMethod" class="form-control" required>
            <option value="Tự chạy">Tự chạy</option>
            <option value="Phòng MKT chạy">Phòng MKT chạy</option>
          </select>
        </div>

        <div class="form-group">
          <label>SĐT đăng ký</label>
          <input type="text" id="phoneNumber" class="form-control" required placeholder="Nhập số điện thoại...">
        </div>
        <div class="form-group">
          <label>Tài khoản ĐK</label>
          <input type="text" id="accountInfo" class="form-control" required placeholder="Nhập link/ID tài khoản...">
        </div>
      </div>

      <button type="submit" id="btnSubmit" class="btn-submit">GỬI ĐĂNG KÝ</button>
    </form>
  </div>

  <div id="tracuu" class="tab-content">
    <div class="section-title">TRA CỨU KẾT QUẢ</div>
    
    <div class="search-box">
      <input type="text" id="searchInput" class="form-control" placeholder="Nhập mã phiếu (VD: DX-1718...)">
      <button type="button" class="btn-submit" onclick="simulateSearch()">TRA CỨU</button>
    </div>

    <div id="searchResultArea" class="search-result-container">
      <div class="stepper-wrapper">
        <div class="stepper-line"></div>
        <div class="stepper-line-fill" id="stepperProgress"></div>
        
        <div class="stepper">
          <div class="step completed">
            <div class="step-circle">✓</div>
            <div class="step-label">TPKD</div>
          </div>
          <div class="step completed">
            <div class="step-circle">✓</div>
            <div class="step-label">GĐKD</div>
          </div>
          <div class="step active">
            <div class="step-circle">3</div>
            <div class="step-label">PTGĐ</div>
          </div>
          <div class="step">
            <div class="step-circle">4</div>
            <div class="step-label">P.MKT</div>
          </div>
          <div class="step">
            <div class="step-circle">5</div>
            <div class="step-label">BLĐ</div>
          </div>
        </div>
      </div>

      <div class="result-card">
        <div class="result-row">
          <span class="result-label">Mã phiếu:</span>
          <span class="result-value val-highlight" id="resId">DX-1718712</span>
        </div>
        <div class="result-row">
          <span class="result-label">Chiến dịch:</span>
          <span class="result-value" id="resProject">Đua Top 20 Tỷ đi Thái Lan</span>
        </div>
        <div class="result-row">
          <span class="result-label">Trạng thái:</span>
          <span class="result-value val-status" id="resStatus">Đang chờ PTGĐ phê duyệt</span>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  // LINK API CHÍNH THỨC CỦA BẠN
  const API_URL = "https://script.google.com/macros/s/AKfycbwFgszaVmJmOhs_GOMlcomv-RTcFJ2SXU4nbrGDRRqS8mZcFOR59YnBEl5boKmTeBFa/exec";

  function switchTab(tabId, element) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    element.classList.add('active');
    document.getElementById(tabId).classList.add('active');
  }

  function simulateSearch() {
    const inputVal = document.getElementById('searchInput').value.trim();
    if (inputVal === "") {
      alert("Vui lòng nhập mã phiếu để tra cứu!");
      return;
    }
    document.getElementById('resId').innerText = inputVal;
    document.getElementById('searchResultArea').style.display = 'block';
    
    // Hiệu ứng thanh tiến trình mô phỏng
    const progressBar = document.getElementById('stepperProgress');
    progressBar.style.width = '0%';
    setTimeout(() => { progressBar.style.width = '50%'; }, 50);
  }

  document.getElementById('marketingForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.innerText = "ĐANG XỬ LÝ...";

    const payload = {
      action: "submitForm",
      data: {
        teamName: document.getElementById('teamName').value,
        memberName: document.getElementById('memberName').value,
        emailContact: "no-email@anviethomes.vn", // Ẩn khỏi UI theo thiết kế
        department: document.getElementById('department').value + " (" + document.getElementById('division').value + ")",
        items: [{
          projectName: document.getElementById('projectName').value,
          proposedBudget: document.getElementById('proposedBudget').value,
          kpi: document.getElementById('kpi').value,
          channel: document.getElementById('channel').value,
          phoneNumber: document.getElementById('phoneNumber').value,
          accountInfo: document.getElementById('accountInfo').value,
          runMethod: document.getElementById('runMethod').value
        }]
      }
    };

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });
      const result = await response.json();
      
      if (result.success) {
        alert("Gửi đăng ký thành công! Mã phiếu của bạn là: " + result.id);
        document.getElementById('marketingForm').reset();
      } else {
        alert("Lỗi: " + result.message);
      }
    } catch (error) {
      alert("Lỗi kết nối máy chủ! Vui lòng kiểm tra lại mạng.");
    } finally {
      btn.disabled = false;
      btn.innerText = "GỬI ĐĂNG KÝ";
    }
  });
</script>

</body>
</html>
