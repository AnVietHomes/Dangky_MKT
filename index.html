<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Ký & Tra Cứu Marketing - An Việt Homes</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-dark: #0a1f35;
      --primary-blue: #0056b3;
      --light-blue: #e6f0fa;
      --text-main: #333;
      --border-color: #ddd;
    }
    
    body { font-family: 'Manrope', sans-serif; margin: 0; padding: 0; background-color: #fff; color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
    .split-layout { display: flex; width: 100%; height: 100%; }
    
    /* Left Panel */
    .left-panel { background-color: var(--primary-dark); width: 45%; padding: 50px; display: flex; flex-direction: column; justify-content: space-between; position: relative; color: white; }
    .brand-logo { max-width: 150px; }
    .left-content { z-index: 2; margin-top: -100px; }
    .left-content h3 { font-weight: 500; font-size: 24px; color: #4da6ff; margin: 0 0 5px 0; letter-spacing: 1px; }
    .left-content h1 { font-size: 38px; font-weight: 800; margin: 0; line-height: 1.2; text-transform: uppercase; }
    .illustration-box { width: 100%; height: 350px; background: url('https://placehold.co/600x400/0a1f35/4da6ff?text=Marketing+Campaign') no-repeat center bottom; background-size: contain; opacity: 0.8; }

    /* Right Panel */
    .right-panel { width: 55%; background-color: #fff; display: flex; flex-direction: column; overflow-y: auto; }
    .tabs-header { display: flex; justify-content: flex-end; padding: 30px 50px 0; border-bottom: 1px solid #eee; }
    .tab { padding: 15px 30px; cursor: pointer; font-weight: 700; color: #999; font-size: 15px; text-transform: uppercase; border-bottom: 3px solid transparent; transition: 0.3s; }
    .tab.active { color: var(--primary-blue); border-bottom: 3px solid var(--primary-blue); }
    .tab:hover:not(.active) { color: var(--primary-blue); }
    
    .content-area { padding: 40px 50px; max-width: 700px; margin: 0 auto; width: 100%; box-sizing: border-box; }
    .content-area h2 { color: var(--primary-blue); font-size: 24px; font-weight: 800; margin-top: 0; margin-bottom: 30px; text-transform: uppercase; }
    .tab-content { display: none; animation: fadeIn 0.4s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Form */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #444; }
    .form-control { width: 100%; padding: 14px 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: 'Manrope', sans-serif; font-size: 15px; transition: 0.3s; background: #fafafa; }
    .form-control:focus { border-color: var(--primary-blue); outline: none; background: #fff; box-shadow: 0 0 0 3px rgba(0,86,179,0.1); }
    .btn-primary { background-color: var(--primary-blue); color: white; width: 100%; padding: 16px; border: none; border-radius: 6px; font-size: 16px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.2s; margin-top: 10px; }
    .btn-primary:hover { background-color: #004494; }
    .btn-primary:disabled { background-color: #999; cursor: not-allowed; }

    /* Tra cứu */
    .search-box { display: flex; gap: 10px; margin-bottom: 40px; }
    .search-box .form-control { flex: 1; margin-bottom: 0; }
    .search-box .btn-primary { width: auto; margin-top: 0; padding: 14px 30px; }
    
    @media (max-width: 992px) {
      .split-layout { flex-direction: column; height: auto; overflow: visible; }
      .left-panel { width: 100%; padding: 40px 20px; text-align: center; box-sizing: border-box; }
      .left-content { margin-top: 30px; }
      .illustration-box { display: none; }
      .right-panel { width: 100%; height: auto; overflow: visible; }
      .tabs-header { justify-content: center; padding: 20px 20px 0; }
      .content-area { padding: 30px 20px; }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="split-layout">
  <div class="left-panel">
    <img src="logo.svg" alt="An Việt Homes" class="brand-logo" onerror="this.src='https://placehold.co/150x50/0a1f35/FFF?text=LOGO'">
    <div class="left-content">
      <h3>HỆ THỐNG TRÌNH DUYỆT</h3>
      <h1>ĐĂNG KÝ MARKETING</h1>
    </div>
    <div class="illustration-box"></div>
  </div>

  <div class="right-panel">
    <div class="tabs-header">
      <div class="tab active" onclick="switchTab('dangky', this)">ĐĂNG KÝ CHIẾN DỊCH</div>
      <div class="tab" onclick="switchTab('tracuu', this)">TRA CỨU</div>
    </div>

    <div class="content-area">
      <div id="dangky" class="tab-content active">
        <h2>ĐỀ XUẤT CHIẾN DỊCH MARKETING</h2>
        <form id="marketingForm">
          <div class="grid-2">
            <div class="form-group">
              <label>Tên nhóm / Team</label>
              <input type="text" id="teamName" class="form-control" required placeholder="Nhập tên nhóm...">
            </div>
            <div class="form-group">
              <label>Tên Trưởng Nhóm</label>
              <input type="text" id="memberName" class="form-control" required placeholder="Nhập họ và tên...">
            </div>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label>Phòng Kinh doanh</label>
              <select id="department" class="form-control" required>
                <option value="">Chọn phòng ban</option>
                <option value="Phòng KD 1">Phòng KD 1</option>
                <option value="Phòng KD 2">Phòng KD 2</option>
                <option value="Phòng KD 3">Phòng KD 3</option>
              </select>
            </div>
            <div class="form-group">
              <label>Email liên hệ</label>
              <input type="email" id="emailContact" class="form-control" required placeholder="Nhập email nhận thông báo...">
            </div>
          </div>
          
          <hr style="border: 0; border-top: 1px dashed #ddd; margin: 25px 0;">

          <div class="form-group">
            <label>Tên chiến dịch / Dự án</label>
            <input type="text" id="projectName" class="form-control" required placeholder="Nhập tên chiến dịch hoặc dự án...">
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label>Ngân sách đề xuất (VNĐ)</label>
              <input type="number" id="proposedBudget" class="form-control" required placeholder="VD: 30000000">
            </div>
            <div class="form-group">
              <label>KPI Cam kết</label>
              <input type="text" id="kpi" class="form-control" required placeholder="VD: 50 Data Net">
            </div>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label>Kênh chạy</label>
              <select id="channel" class="form-control">
                <option value="Facebook Ads">Facebook Ads</option>
                <option value="Google Ads">Google Ads</option>
                <option value="Tiktok Ads">Tiktok Ads</option>
              </select>
            </div>
            <div class="form-group">
              <label>Phương án chạy</label>
              <select id="runMethod" class="form-control">
                <option value="Tự chạy">Tự chạy</option>
                <option value="P.MKT chạy">Phòng MKT chạy</option>
              </select>
            </div>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label>SĐT đăng ký</label>
              <input type="text" id="phoneNumber" class="form-control" required placeholder="Nhập số điện thoại...">
            </div>
            <div class="form-group">
              <label>Tài khoản ĐK</label>
              <input type="text" id="accountInfo" class="form-control" required placeholder="Nhập link/ID tài khoản...">
            </div>
          </div>

          <button type="submit" id="btnSubmit" class="btn-primary">GỬI ĐỀ XUẤT TRÌNH DUYỆT</button>
        </form>
      </div>

      <div id="tracuu" class="tab-content">
        <h2>TRA CỨU TIẾN ĐỘ PHÊ DUYỆT</h2>
        <div class="search-box">
          <input type="text" id="searchInput" class="form-control" placeholder="Nhập mã phiếu (VD: DX-1718...)">
          <button type="button" class="btn-primary" onclick="alert('Tính năng tra cứu theo mã đang được hoàn thiện cập nhật!')">TRA CỨU</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  // LINK API CHÍNH THỨC
  const API_URL = "https://script.google.com/macros/s/AKfycbwFgszaVmJmOhs_GOMlcomv-RTcFJ2SXU4nbrGDRRqS8mZcFOR59YnBEl5boKmTeBFa/exec";

  function switchTab(tabId, element) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    element.classList.add('active');
    document.getElementById(tabId).classList.add('active');
  }

  document.getElementById('marketingForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.innerText = "ĐANG XỬ LÝ...";

    const payload = {
      action: "submitForm",
      data: {
        teamName: document.getElementById('teamName').value,
        memberName: document.getElementById('memberName').value,
        department: document.getElementById('department').value,
        emailContact: document.getElementById('emailContact').value,
        items: [{
          projectName: document.getElementById('projectName').value,
          proposedBudget: document.getElementById('proposedBudget').value,
          kpi: document.getElementById('kpi').value,
          channel: document.getElementById('channel').value,
          phoneNumber: document.getElementById('phoneNumber').value,
          accountInfo: document.getElementById('accountInfo').value,
          runMethod: document.getElementById('runMethod').value
        }]
      }
    };

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });
      const result = await response.json();
      
      if(result.success) {
        alert("Gửi đề xuất thành công! Mã phiếu của bạn là: " + result.id);
        document.getElementById('marketingForm').reset();
      } else {
        alert("Lỗi: " + result.message);
      }
    } catch (error) {
      alert("Lỗi kết nối máy chủ!");
    } finally {
      btn.disabled = false;
      btn.innerText = "GỬI ĐỀ XUẤT TRÌNH DUYỆT";
    }
  });
</script>
</body>
</html>
