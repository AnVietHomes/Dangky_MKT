<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ Thống Phê Duyệt Marketing - Admin</title>
  
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-blue: #004d99;
      --light-bg: #f4f7f6;
      --success: #27ae60;
      --warning: #f39c12;
      --danger: #e74c3c;
    }
    
    body { font-family: 'Manrope', sans-serif; background-color: var(--light-bg); margin: 0; color: #333; }
    
    /* Giao diện Login */
    .login-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
    .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 360px; text-align: center; border-top: 5px solid var(--primary-blue); }
    .brand-logo { max-width: 160px; height: auto; margin-bottom: 20px; }
    .login-box h2 { color: var(--primary-blue); margin-bottom: 25px; font-weight: 800; font-size: 22px; line-height: 1.4; }
    .form-input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-family: 'Manrope'; font-size: 15px; }
    .form-input:focus { border-color: var(--primary-blue); outline: none; }
    .btn-login { width: 100%; background: var(--primary-blue); color: white; border: none; padding: 14px; border-radius: 5px; cursor: pointer; font-weight: 700; font-size: 16px; font-family: 'Manrope'; transition: 0.3s; }
    .btn-login:hover { background: #003d7a; }
    
    /* Giao diện Dashboard */
    .dashboard-container { display: none; padding: 30px; max-width: 1400px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd; padding-bottom: 15px; margin-bottom: 25px; }
    .header-left { display: flex; align-items: center; gap: 20px; }
    .header-logo { max-width: 120px; height: auto; }
    .header h2 { margin: 0; color: var(--primary-blue); font-weight: 800; }
    #userInfo { font-weight: 600; color: #555; background: #e6f0fa; padding: 8px 15px; border-radius: 20px; }

    /* Thẻ thống kê */
    .stats-board { display: flex; gap: 20px; margin-bottom: 30px; overflow-x: auto; padding-bottom: 10px; }
    .stat-card { flex: 1; min-width: 250px; background: white; padding: 20px; border-radius: 8px; border-left: 5px solid var(--primary-blue); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .stat-card h4 { margin: 0 0 10px 0; color: #777; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 26px; font-weight: 800; color: var(--primary-blue); }
    .stat-diff { font-size: 14px; margin-top: 8px; font-weight: 600; color: #555; }
    .stat-diff.negative { color: var(--danger); }
    .stat-diff.positive { color: var(--success); }

    /* Table Duyệt */
    .table-wrap { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { background: var(--primary-blue); color: white; padding: 15px 10px; text-align: center; font-weight: 600; font-size: 14px; }
    td { padding: 12px 10px; border-bottom: 1px solid #eee; text-align: center; vertical-align: middle; font-size: 14px; }
    tbody tr:hover { background-color: #f9fdfa; }
    
    .input-budget { width: 130px; padding: 10px; border: 2px solid #3498db; border-radius: 4px; text-align: right; font-weight: 800; color: var(--danger); font-family: 'Manrope'; font-size: 15px; background: #fffaf9; transition: 0.3s; }
    .input-budget:focus { border-color: var(--danger); outline: none; }
    .input-note { width: 90%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-family: 'Manrope'; }
    .input-note:focus { border-color: var(--primary-blue); outline: none; }
    
    .actions-bar { margin-top: 25px; display: flex; justify-content: flex-end; gap: 15px; }
    .btn-action { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: 700; font-family: 'Manrope'; font-size: 15px; color: white; transition: 0.2s; }
    .btn-draft { background: var(--warning); }
    .btn-draft:hover { background: #d68910; }
    .btn-approve { background: var(--success); }
    .btn-approve:hover { background: #219653; }
    
    .badge { padding: 5px 10px; border-radius: 12px; font-size: 12px; font-weight: 700; background: #e6f0fa; color: var(--primary-blue); }
  </style>
</head>
<body>

  <div class="login-container" id="loginScreen">
    <div class="login-box">
      <img src="logo.svg" alt="An Việt Homes" class="brand-logo">
      <h2>CỔNG QUẢN TRỊ & PHÊ DUYỆT</h2>
      <input type="text" id="username" class="form-input" placeholder="Tài khoản (VD: gdkd_nam)">
      <input type="password" id="password" class="form-input" placeholder="Mật khẩu">
      <button class="btn-login" onclick="handleLogin()">ĐĂNG NHẬP</button>
    </div>
  </div>

  <div class="dashboard-container" id="dashboardScreen">
    <div class="header">
      <div class="header-left">
        <img src="logo.svg" alt="An Việt Homes" class="header-logo">
        <h2>KHU VỰC PHÊ DUYỆT - BAN LÃNH ĐẠO</h2>
      </div>
      <div id="userInfo">Xin chào, BLĐ</div>
    </div>

    <div class="stats-board" id="statsBoard">
      </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th width="8%">Mã Phiếu</th>
            <th width="12%">Phòng Ban</th>
            <th width="20%">Dự Án / Chiến Dịch</th>
            <th width="15%">Đề Xuất (VNĐ)</th>
            <th width="15%">BLĐ Thực Duyệt (VNĐ)</th>
            <th width="30%">Ghi chú điều chỉnh (Tùy chọn)</th>
          </tr>
        </thead>
        <tbody id="bldTableBody">
          <tr data-id="D-12345" data-project="Đua Top 20 Tỷ đi Thái Lan" data-proposed="30000000">
            <td><span class="badge">DX-123</span></td>
            <td>Phòng KD 1</td>
            <td style="font-weight: 600; color: var(--primary-blue);">Đua Top 20 Tỷ đi Thái Lan</td>
            <td>30,000,000</td>
            <td>
              <input type="number" class="input-budget" value="30000000" oninput="calculateTotals()">
            </td>
            <td><input type="text" class="input-note" placeholder="Nhập lý do nếu cắt giảm..."></td>
          </tr>
          <tr data-id="D-12346" data-project="Đua Top 20 Tỷ đi Thái Lan" data-proposed="25000000">
            <td><span class="badge">DX-124</span></td>
            <td>Phòng KD 2</td>
            <td style="font-weight: 600; color: var(--primary-blue);">Đua Top 20 Tỷ đi Thái Lan</td>
            <td>25,000,000</td>
            <td>
              <input type="number" class="input-budget" value="25000000" oninput="calculateTotals()">
            </td>
            <td><input type="text" class="input-note"></td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="actions-bar">
      <button class="btn-action btn-draft" onclick="saveDraft()">Lưu Nháp Tạm Thời</button>
      <button class="btn-action btn-approve" onclick="finalApprove()">Chốt Phê Duyệt & Xuất Form Cuối</button>
    </div>
  </div>

  <script>
    // ĐIỀN LINK WEB APP CỦA BẠN VÀO ĐÂY SAU KHI DEPLOY GAS
    const API_URL = "YOUR_WEB_APP_URL"; 

    // --- LOGIC GIAO DIỆN & TÍNH TOÁN REAL-TIME --- //
    
    function handleLogin() {
      // Giả lập vượt qua đăng nhập để test luồng BLĐ ngay lập tức
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboardScreen').style.display = 'block';
      calculateTotals(); 
    }

    function calculateTotals() {
      const rows = document.querySelectorAll('#bldTableBody tr');
      let summary = {};
      let totalProposedAll = 0;
      let totalApprovedAll = 0;

      rows.forEach(row => {
        const projectName = row.getAttribute('data-project');
        const proposed = parseFloat(row.getAttribute('data-proposed')) || 0;
        const approvedInput = row.querySelector('.input-budget').value;
        const approved = parseFloat(approvedInput) || 0;

        if (!summary[projectName]) {
          summary[projectName] = { proposed: 0, approved: 0 };
        }
        summary[projectName].proposed += proposed;
        summary[projectName].approved += approved;
        
        totalProposedAll += proposed;
        totalApprovedAll += approved;
      });

      const statsBoard = document.getElementById('statsBoard');
      let html = `
        <div class="stat-card" style="border-color: #27ae60; background: #f9fdfa;">
          <h4>TỔNG NGÂN SÁCH DUYỆT (ALL)</h4>
          <div class="stat-value" style="color: #27ae60">${totalApprovedAll.toLocaleString('vi-VN')} VNĐ</div>
          <div class="stat-diff">Tổng đề xuất gốc: ${totalProposedAll.toLocaleString('vi-VN')} VNĐ</div>
        </div>
      `;

      for (const [project, data] of Object.entries(summary)) {
        const diff = data.approved - data.proposed;
        const diffClass = diff < 0 ? 'negative' : (diff > 0 ? 'positive' : '');
        const diffSign = diff > 0 ? '+' : '';
        
        html += `
          <div class="stat-card">
            <h4>DỰ ÁN: ${project}</h4>
            <div class="stat-value">${data.approved.toLocaleString('vi-VN')} VNĐ</div>
            <div class="stat-diff ${diffClass}">
              Chênh lệch: ${diffSign}${diff.toLocaleString('vi-VN')} VNĐ
            </div>
          </div>
        `;
      }
      statsBoard.innerHTML = html;
    }

    // --- LOGIC API FETCH --- //

    async function sendDataToBackend(isFinal) {
      const payload = {
        action: "bldApprove",
        isFinalApprove: isFinal,
        items: []
      };

      document.querySelectorAll('#bldTableBody tr').forEach(row => {
        payload.items.push({
          idDong: row.getAttribute('data-id'),
          nganSachDuyet: row.querySelector('.input-budget').value,
          ghiChuBLD: row.querySelector('.input-note').value
        });
      });

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        return result;
      } catch (error) {
        console.error("Fetch error:", error);
        return { success: false, message: "Lỗi kết nối máy chủ." };
      }
    }

    async function saveDraft() {
      const result = await sendDataToBackend(false);
      if(result.success) {
        alert("Đã lưu nháp thành công! Bạn có thể quay lại duyệt tiếp sau.");
      } else {
        alert("Có lỗi xảy ra khi lưu nháp.");
      }
    }

    async function finalApprove() {
      if(!confirm("Xác nhận chốt phê duyệt? Hệ thống sẽ kết xuất tự động ra File Excel (Form cuối) và gửi thông báo cho P.MKT.")) return;
      
      const result = await sendDataToBackend(true);
      if(result.success) {
        alert("Đã phê duyệt thành công! Luồng dữ liệu đã được đẩy đi.");
        // Chuyển hướng hoặc reload sau khi duyệt xong
        // window.location.reload(); 
      } else {
        alert("Có lỗi xảy ra: " + result.message);
      }
    }
  </script>
</body>
</html>
