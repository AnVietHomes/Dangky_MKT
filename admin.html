<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cổng Quản Trị - An Việt Homes</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-dark: #0a1f35;
      --primary-blue: #0056b3;
      --text-main: #333;
      --border-color: #ddd;
    }
    
    body { font-family: 'Manrope', sans-serif; margin: 0; padding: 0; background-color: #f8f9fa; color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
    
    /* Màn Hình Login Split Layout */
    .split-layout { display: flex; width: 100%; height: 100%; }
    
    .left-panel { background-color: var(--primary-dark); width: 45%; padding: 50px; display: flex; flex-direction: column; justify-content: space-between; position: relative; color: white; }
    .brand-logo { max-width: 150px; }
    .left-content { z-index: 2; margin-top: -100px; }
    .left-content h3 { font-weight: 500; font-size: 24px; color: #4da6ff; margin: 0 0 5px 0; letter-spacing: 1px; }
    .left-content h1 { font-size: 38px; font-weight: 800; margin: 0; line-height: 1.2; text-transform: uppercase; }
    .illustration-box { width: 100%; height: 350px; background: url('https://placehold.co/600x400/0a1f35/4da6ff?text=Illustration+Image') no-repeat center bottom; background-size: contain; opacity: 0.8; }

    .right-panel { width: 55%; background-color: #fff; display: flex; align-items: center; justify-content: center; }
    
    .login-box { width: 100%; max-width: 420px; padding: 40px; }
    .login-box h2 { font-size: 28px; font-weight: 800; color: var(--primary-dark); margin: 0 0 5px 0; text-transform: uppercase; }
    .login-box p { color: #777; margin-bottom: 30px; font-size: 15px; }
    
    .form-group { margin-bottom: 20px; position: relative; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #444; }
    .form-control { width: 100%; padding: 14px 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: 'Manrope'; font-size: 15px; transition: 0.3s; background: #fafafa; }
    .form-control:focus { border-color: var(--primary-blue); outline: none; background: #fff; }
    
    .password-toggle { position: absolute; right: 15px; top: 40px; cursor: pointer; color: #999; font-size: 12px; font-weight: 600; }
    
    .login-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; font-size: 14px; }
    .remember-me { display: flex; align-items: center; gap: 8px; cursor: pointer; color: #555; font-weight: 500; }
    .forgot-password { color: var(--primary-blue); text-decoration: none; font-weight: 600; }
    .forgot-password:hover { text-decoration: underline; }

    .btn-primary { background-color: var(--primary-blue); color: white; width: 100%; padding: 16px; border: none; border-radius: 6px; font-size: 16px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
    .btn-primary:hover { background-color: #004494; }

    /* Màn Hình Dashboard (Ẩn mặc định) */
    .dashboard-container { display: none; width: 100%; height: 100%; overflow-y: auto; padding: 30px; box-sizing: border-box; background: #f4f7f6; }
    .dash-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd; padding-bottom: 15px; margin-bottom: 25px; }
    .dash-logo { max-width: 120px; }
    .dash-title { color: var(--primary-blue); font-weight: 800; margin: 0; }
    
    /* Responsive */
    @media (max-width: 992px) {
      .split-layout { flex-direction: column; height: auto; overflow: visible; }
      .left-panel, .right-panel { width: 100%; }
      .left-panel { padding: 40px 20px; text-align: center; }
      .illustration-box { display: none; }
      .login-box { padding: 40px 20px; }
    }
  </style>
</head>
<body>

  <div class="split-layout" id="loginScreen">
    <div class="left-panel">
      <img src="logo.svg" alt="An Việt Homes" class="brand-logo">
      <div class="left-content">
        <h3>HỆ THỐNG TRÌNH DUYỆT</h3>
        <h1>ĐĂNG KÝ MARKETING</h1>
      </div>
      <div class="illustration-box"></div>
    </div>
    
    <div class="right-panel">
      <div class="login-box">
        <h2>ĐĂNG NHẬP</h2>
        <p>Vui lòng đăng nhập để tiếp tục</p>
        
        <form onsubmit="event.preventDefault(); handleLogin();">
          <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text" class="form-control" placeholder="Nhập tài khoản...">
          </div>
          <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="pwdInput" class="form-control" placeholder="Nhập mật khẩu...">
            <span class="password-toggle" onclick="togglePassword()">HIỆN</span>
          </div>
          
          <div class="login-options">
            <label class="remember-me">
              <input type="checkbox"> Ghi nhớ đăng nhập
            </label>
            <a href="#" class="forgot-password">Quên mật khẩu?</a>
          </div>

          <button type="submit" class="btn-primary">ĐĂNG NHẬP</button>
        </form>
      </div>
    </div>
  </div>

  <div class="dashboard-container" id="dashboardScreen">
    <div class="dash-header">
      <div style="display: flex; align-items: center; gap: 20px;">
        <img src="logo.svg" alt="An Việt Homes" class="dash-logo">
        <h2 class="dash-title">KHU VỰC PHÊ DUYỆT - BAN LÃNH ĐẠO</h2>
      </div>
      <div style="font-weight: 600; background: #e6f0fa; padding: 8px 15px; border-radius: 20px;">Xin chào, BLĐ</div>
    </div>
    
    <h3 style="text-align: center; color: #555; margin-top: 50px;">Bảng thông kê và tính năng duyệt nháp sẽ hiển thị tại đây...</h3>
    <p style="text-align: center;"><a href="#" onclick="window.location.reload()">Đăng xuất</a></p>
  </div>

  <script>
    function togglePassword() {
      const pwd = document.getElementById('pwdInput');
      const toggle = document.querySelector('.password-toggle');
      if(pwd.type === 'password') {
        pwd.type = 'text';
        toggle.textContent = 'ẨN';
      } else {
        pwd.type = 'password';
        toggle.textContent = 'HIỆN';
      }
    }

    function handleLogin() {
      // Giả lập vượt qua đăng nhập
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboardScreen').style.display = 'block';
    }
  </script>
</body>
</html>
